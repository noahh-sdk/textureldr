

#####################################
#
# Can't be used until layout branch is merged to main
#
#####################################

name: Build Noahh Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "main"

env:
  NOAHH_SDK: ${{ github.workspace }}/sdk
  MOD_NAME: TextureLDR
  MOD_ID: noahh.textureldr

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: "Windows"
          bin_folder: "windows"
          os: windows-2019
          extra_flags: '-G "Visual Studio 16 2019" -T host=x64 -A win32'
          out_paths:  './build/Release/*.dll'
          platform_suffix: 'win'
          
        - name: "macOS"
          bin_folder: "macos"
          os: macos-latest
          extra_flags: ""
          out_paths: './build/*.dylib'
          platform_suffix: 'mac'
          
    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - uses: actions/checkout@v3
      with:
        submodules: recursive
        repository: noahh-sdk/noahh
        # ref: v0.4.8
        path: ${{ env.NOAHH_SDK }}
     
    - uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x86
      
    - name: Download Noahh SDK binaries
      run: |
        cd ${{ github.workspace }}/sdk
        mkdir bin
        mkdir bin/nightly
        cd bin/nightly
        curl -L https://github.com/noahh-sdk/noahh/releases/download/v1.0.0/noahh-v1.0.0-${{ matrix.config.platform_suffix }}.zip -o noahh-sdk.zip
        tar -xf noahh-sdk.zip
    - name: Configure CMake
      run: |
        cd ${{ github.workspace }}
        cmake -B build ${{ matrix.config.extra_flags }} -DNOAHH_DISABLE_CLI_CALLS=1
    
    - name: Build
      run: |
        cd ${{ github.workspace }}/build
        cmake --build . --config Release
    
    - uses: actions/upload-artifact@v3
      with:
        name: "build-${{ matrix.config.bin_folder }}"
        path: "${{ matrix.config.out_paths }}"
        
        
  package:
    name: "Package both builds"
    # would use linux but theres no cli build for it
    runs-on: windows-2019
    needs: ['build']
    
    steps:          
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      
      - name: Download and Unzip CLI
        run: |
          curl -L https://github.com/noahh-sdk/cli/releases/download/v1.2.0/noahh-cli-v1.2.0-win.zip -o noahh-cli.zip
          tar -xf noahh-cli.zip
      - uses: actions/download-artifact@v3
        with:
          name: build-windows
          
      - uses: actions/download-artifact@v3
        with:
          name: build-macos
          
      - name: Display structure of downloaded files
        run: ls -R
      
      - name: Merge
        shell: bash
        run: |
          mv $MOD_NAME.dll $MOD_ID.dll
          mv lib$MOD_NAME.dylib $MOD_ID.dylib
          ./noahh.exe package new . --binary $MOD_ID.dll --binary $MOD_ID.dylib --output $MOD_NAME.noahh
         
      - uses: actions/upload-artifact@v3
        with:
          name: Build Output
          path: "${{ env.MOD_NAME }}.noahh"
          
      - uses: geekyeggo/delete-artifact@v2
        with:
            name: build-windows
            failOnError: false
          
      - uses: geekyeggo/delete-artifact@v2
        with:
            name: build-macos
            failOnError: false